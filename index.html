<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Markly | Institutional Attendance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            // Indigo & Cool Gray Palette
            bg: {
              DEFAULT: '#F5F7FF', // User Requested Background Tint
              card: '#ffffff',
              surface: '#EEF2FF', // Brushed Indigo Surface
              sidebar: '#1E1B4B', // Keep Dark Indigo Sidebar
            },
            // Remapping 'slate' to Cool Grays for Indigo theme compatibility
            slate: {
              50: '#F9FAFB',
              100: '#F3F4F6',
              200: '#E5E7EB',
              300: '#D1D5DB',
              400: '#9CA3AF',
              500: '#6B7280',
              600: '#4B5563',
              700: '#374151',
              800: '#1F2937',
              900: '#111827',
            },
            // Indigo Primary
            primary: {
              50: '#F5F7FF', // Background Match
              100: '#E0E7FF',
              200: '#C7D2FE',
              300: '#A5B4FC',
              400: '#818CF8',
              500: '#6366F1', // Secondary / Accent
              600: '#4F46E5', // Primary / Buttons
              700: '#4338CA',
              800: '#3730A3',
              900: '#312E81',
              950: '#1E1B4B', // Darkest Indigo
            },
            status: {
              success: '#4d7c0f',
              warning: '#b45309',
              error: '#be123c',
            }
          },
          boxShadow: {
            'soft': '0 4px 6px -1px rgba(79, 70, 229, 0.1), 0 2px 4px -1px rgba(79, 70, 229, 0.06)', // Indigo tinted shadow
            'card': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
            'glow': '0 0 15px rgba(79, 70, 229, 0.3)', // Indigo glow
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #f5f5f4;
      /* Stone 100 */
      color: #44403c;
      /* Stone 700 */
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f5f5f4;
    }

    ::-webkit-scrollbar-thumb {
      background: #d6d3d1;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a8a29e;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
